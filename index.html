<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Get 'Em, Habibi! ❤️</title>
    <style>
        body {
            background-color: #fff5f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: #590d22;
        }

        /* The Animated Heart */
        .heart {
            font-size: 50px;
            animation: pulse 1.5s infinite;
            margin-bottom: 10px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
        }

        h1 { color: #ff4d6d; font-size: 2rem; margin-bottom: 5px; }
        .subtitle { font-style: italic; margin-bottom: 30px; opacity: 0.8; }

        /* Step 1: The Game Area */
        #game-section { display: block; }
        .btn-container {
            position: relative;
            height: 150px;
            margin-top: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }
        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: absolute;
            white-space: nowrap;
        }

        /* Step 2: The Reveal Area */
        #reveal-section { display: none; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            background: white;
            border: 2px dashed #ffb3c1;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .card:hover { background: #ffe3e8; transform: translateY(-5px); }
        
        #final-message {
            display: none;
            margin-top: 30px;
            font-size: 22px;
            color: #ff4d6d;
            font-weight: bold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div class="heart">❤️</div>

    <div id="game-section" class="container">
        <h1>Are you ready to crush this interview?</h1>
        <p class="subtitle">(Try to click "No" if you're nervous... I dare you!)</p>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="startReveal()">YES, I'M READY!</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">I'm nervous...</button>
        </div>
    </div>

    <div id="reveal-section" class="container">
        <h1>That's the spirit! 🏆</h1>
        <p>Before you walk in, remember these 4 things:</p>
        
        <div class="grid">
            <div class="card" onclick="this.innerHTML='You are the smartest person I know! 🧠'">✨ Click Me ✨</div>
            <div class="card" onclick="this.innerHTML='Your hard work always pays off! 💪'">✨ Click Me ✨</div>
            <div class="card" onclick="this.innerHTML='Anyone would be lucky to have you! 🤝'">✨ Click Me ✨</div>
            <div class="card" onclick="this.innerHTML='I am your #1 fan forever! ❤️'">✨ Click Me ✨</div>
        </div>

        <div id="final-message">
            NOW GO IN THERE AND BE THE BOSS YOU ARE! <br> I LOVE YOU! 🥳🎉
        </div>
    </div>

    <script>
        function moveButton() {
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 150);
            const noBtn = document.getElementById('noBtn');
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function startReveal() {
            document.getElementById('game-section').style.display = 'none';
            document.getElementById('reveal-section').style.display = 'block';
            
            // Show final message after a short delay once they start clicking cards
            setTimeout(() => {
                document.getElementById('final-message').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
